{{ define "main" }}
<section class="page">
  <header class="page__header">
    <h1>{{ .Title }}</h1>
    {{ with .Params.description }}<p class="page__lead">{{ . }}</p>{{ end }}
  </header>
  <div class="listing">
    {{ range .Pages.ByDate.Reverse }}
    <article class="listing__item">
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      {{ with .Params.excerpt }}<p>{{ . }}</p>{{ end }}
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
