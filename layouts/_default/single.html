{{ define "main" }}
<article class="page">
  <header class="page__header">
    <p class="eyebrow">{{ .Params.eyebrow }}</p>
    <h1>{{ .Title }}</h1>
    {{ with .Params.description }}<p class="page__lead">{{ . }}</p>{{ end }}
  </header>
  <div class="prose">
    {{ .Content }}
  </div>
</article>
{{ end }}
