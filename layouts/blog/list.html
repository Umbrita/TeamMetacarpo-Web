{{ define "main" }}
<section class="page blog-index">
  <header class="page__header">
    <p class="eyebrow">{{ .Params.eyebrow }}</p>
    <h1>{{ .Title }}</h1>
    <p class="page__lead">{{ .Params.description }}</p>
  </header>
  <div class="listing">
    {{ range .Pages.ByDate.Reverse }}
    <article class="listing__item">
      <p class="meta">{{ time.Format "2006-01-02" .Date }} · {{ .Params.author }} · <a href="{{ relLangURL (printf "/categories/%s/" (urlize .Params.category)) }}">{{ .Params.category }}</a></p>
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      <p>{{ .Params.excerpt }}</p>
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
