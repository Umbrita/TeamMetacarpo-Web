{{ $src := .src }}
{{ $alt := .alt | default "" }}
{{ $width := .width | default "" }}
{{ $height := .height | default "" }}
{{ $loading := .loading | default "lazy" }}
<img src="{{ $src }}" alt="{{ $alt }}"{{ with $width }} width="{{ . }}"{{ end }}{{ with $height }} height="{{ . }}"{{ end }} loading="{{ $loading }}">
